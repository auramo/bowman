---
- name: Deploy Bowman
  hosts: bowman_servers
  become: true

  vars:
    domain: talous.perttuauramo.com
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') | default('you@example.com', true) }}"
    dockerhub_username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    dockerhub_password: "{{ lookup('env', 'DOCKERHUB_PASSWORD') }}"

  roles:
    - podman
    - app
    - certbot
    - nginx
